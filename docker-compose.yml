services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: content_user
      POSTGRES_PASSWORD: content_password
      POSTGRES_DB: content_review
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U content_user -d content_review"]
      interval: 5s
      timeout: 3s
      retries: 20
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    environment:
      NODE_ENV: development
      PORT: 4000
      DATABASE_URL: postgres://content_user:content_password@postgres:5432/content_review
      RESERVATION_TTL_MINUTES: 20
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy

  frontend:
    build: ./frontend
    environment:
      VITE_API_PROXY_TARGET: http://backend:4000
    ports:
      - "5173:5173"
    depends_on:
      - backend

volumes:
  postgres_data:

